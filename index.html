<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Books Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-content">
          <p class="eyebrow">Book discovery</p>
          <h1>Find your next read.</h1>
          <p class="hero-text">
            Search books quickly and browse a clean collection of thoughtful recommendations.
          </p>

          <form id="search-form" class="search-form">
            <input
              id="search-input"
              type="text"
              placeholder="Search for books, authors, or topics"
              aria-label="Search books"
            />
            <button type="submit">Search</button>
          </form>
        </div>
      </header>

      <main class="content">
        <section class="results-header">
          <div>
            <h2>Results</h2>
            <p id="results-status">Enter a search term to begin.</p>
          </div>
        </section>

        <section id="results-grid" class="results-grid" aria-live="polite"></section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
