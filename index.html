<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Books Explorer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-content">
          <div class="hero-badge">Curated literary discovery</div>
          <p class="eyebrow">Books, made searchable</p>
          <h1>Discover your next favorite read</h1>
          <p class="hero-text">
            Search the Google Books catalog and browse titles, authors, and previews in one polished experience.
          </p>

          <form id="search-form" class="search-form">
            <input
              id="search-input"
              type="text"
              placeholder="Search for books, authors, or topics"
              aria-label="Search books"
            />
            <button type="submit">Search</button>
          </form>

          <div class="hero-highlights">
            <span>Live-ready layout</span>
            <span>Modern cards</span>
            <span>Responsive design</span>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="results-header">
          <div>
            <h2>Results</h2>
            <p id="results-status">Enter a search term to begin.</p>
          </div>
          <div class="results-pill">Fresh picks</div>
        </section>

        <section id="results-grid" class="results-grid" aria-live="polite"></section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
